name: Microservice CI

on:
  workflow_call:
    inputs:
      service:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # -------------------
      # Compute lowercase owner (GHCR requires lowercase repo names)
      # -------------------
      - name: Set lowercase owner
        run: echo "OWNER_LC=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      # -------------------
      # Checkout source
      # -------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # -------------------
      # Docker Buildx (cache support)
      # -------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------
      # Login to GHCR
      # -------------------
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -------------------
      # Build Docker image (cached)
      # -------------------
      - name: Build Image
        env:
          IMAGE_NAME: ghcr.io/${{ env.OWNER_LC }}/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}
        run: |
          if [ "${{ inputs.service }}" == "cartservice" ]; then
            CONTEXT="./src/cartservice/src"
          else
            CONTEXT="./src/${{ inputs.service }}"
          fi
          docker build \
            --cache-from=type=gha \
            --cache-to=type=gha,mode=max \
            -t $IMAGE_NAME \
            "$CONTEXT"

      # -------------------
      # Security Scan (before push)
      # -------------------
      - name: Run Trivy Scan
        env:
          IMAGE_NAME: ghcr.io/${{ env.OWNER_LC }}/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}
        uses: aquasecurity/trivy-action@v0.20.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}
          severity: HIGH,CRITICAL
          exit-code: 0
          vuln-type: os,library

      # -------------------
      # Push image (only if scan passes)
      # -------------------
      - name: Push Image
        env:
          IMAGE_NAME: ghcr.io/${{ env.OWNER_LC }}/microservices-demo/${{ inputs.service }}:sha-${{ github.sha }}
        run: |
          docker push $IMAGE_NAME
